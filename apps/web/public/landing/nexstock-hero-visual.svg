<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NexStock landing hero visual</title>
  <desc id="desc">Professional dark landing page visual with NexStock branding, product operations metrics, integrations, and cloud growth panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061226"/>
      <stop offset="0.55" stop-color="#09111f"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3e73ff"/>
      <stop offset="0.45" stop-color="#16c7d0"/>
      <stop offset="1" stop-color="#44f0b4"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3e73ff"/>
      <stop offset="0.55" stop-color="#7d45ff"/>
      <stop offset="1" stop-color="#44f0b4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="982" cy="106" r="220" fill="#10b981" opacity="0.10"/>
  <circle cx="150" cy="664" r="260" fill="#6366f1" opacity="0.14"/>

  <g transform="translate(76 70)" filter="url(#shadow)">
    <rect width="1048" height="620" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="34" y="34" width="980" height="118" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(62 57)">
      <path d="M0 58 L0 18 L24 0 L24 64 L12 72 Z" fill="url(#purple)"/>
      <path d="M20 0 L98 78 Q108 88 120 80 L142 64 L142 95 L122 110 Q104 123 88 106 L12 28 Q4 20 0 22 L0 0 Z" fill="url(#brand)"/>
      <path d="M134 10 L154 0 L154 48 L134 60 Z" fill="#44f0b4"/>
      <path d="M164 0 L186 -12 L186 56 L164 68 Z" fill="#20d3c6"/>
    </g>
    <text x="282" y="94" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">Nex<tspan font-weight="300">Stock</tspan></text>
    <text x="284" y="126" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="8" fill="url(#brand)">CONNECT · MANAGE · GROW</text>

    <g transform="translate(34 196)">
      <rect width="300" height="170" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8">PRODUCTS</text>
      <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">12,480</text>
      <rect x="24" y="122" width="210" height="10" fill="#ffffff" opacity="0.12"/>
      <rect x="24" y="122" width="166" height="10" fill="url(#brand)"/>
    </g>
    <g transform="translate(374 196)">
      <rect width="300" height="170" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8">INTEGRATIONS</text>
      <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">14</text>
      <path d="M26 128 C75 86 132 156 182 108 S246 86 274 120" fill="none" stroke="url(#purple)" stroke-width="7" stroke-linecap="round"/>
    </g>
    <g transform="translate(714 196)">
      <rect width="300" height="170" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8">GROWTH</text>
      <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">99.98%</text>
      <g transform="translate(24 116)" fill="url(#brand)">
        <rect width="30" height="28"/><rect x="48" y="-18" width="30" height="46"/><rect x="96" y="-42" width="30" height="70"/><rect x="144" y="-66" width="30" height="94"/>
      </g>
    </g>

    <g transform="translate(34 410)">
      <rect width="980" height="150" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8">LIVE OPERATIONS</text>
      <g transform="translate(24 70)">
        <circle cx="10" cy="10" r="7" fill="#10b981"/><text x="32" y="15" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f8fafc">API health operational</text>
        <circle cx="330" cy="10" r="7" fill="#10b981"/><text x="352" y="15" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f8fafc">Import queue clear</text>
        <circle cx="628" cy="10" r="7" fill="#8b5cf6"/><text x="650" y="15" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f8fafc">Webhook delivery monitoring</text>
      </g>
      <rect x="24" y="106" width="932" height="12" fill="#ffffff" opacity="0.10"/>
      <rect x="24" y="106" width="758" height="12" fill="url(#brand)"/>
    </g>
  </g>
</svg>
